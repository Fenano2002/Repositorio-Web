<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 7 - Preferencias Musicales</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="../../img pagina principal/upiicsa.png" type="image/jpeg">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Repositorio Web</div>
        <ul class="nav-links">
            <li><a href="../../index.html">REGRESAR</a></li>
        </ul>
    </nav>
    <main>
    <h1>Preferencias musicales</h1>

    <form action="#" method="post">
        
        <p>Elija sus tipos de música favorita:</p>
        <input type="checkbox" id="rock_check" value="Rock">
        <label for="rock_check">Rock</label>
        
        <input type="checkbox" id="pop_check" value="Pop">
        <label for="pop_check">Pop</label>
        
        <input type="checkbox" id="jazz_check" value="Jazz">
        <label for="jazz_check">Jazz</label>

        <hr>

        <p>Seleccione su edad:</p>
        <input type="radio" id="edad1" name="edad" value="12-17">
        <label for="edad1">de 12 a 17 años</label><br>
        
        <input type="radio" id="edad2" name="edad" value="18-35">
        <label for="edad2">de 18 a 35 años</label><br>
        
        <input type="radio" id="edad3" name="edad" value="36-65">
        <label for="edad3">de 36 a 65 años</label><br>
        
        <input type="radio" id="edad4" name="edad" value="65+">
        <label for="edad4">más de 65</label>

        <hr>

        <p>Grupos y cantantes que te gustan (puedes elegir varios):</p>
        <select name="artistas" multiple size="12">
            <optgroup label="Rock">
                <option value="acdc">AC/DC</option>
                <option value="queen">Queen</option>
                <option value="the-rolling-stones">The Rolling Stones</option>
            </optgroup>
            
            <optgroup label="Pop">
                <option value="michael-jackson">Michael Jackson</option>
                <option value="madonna">Madonna</option>
                <option value="lady-gaga">Lady Gaga</option>
            </optgroup>
            
            <optgroup label="Jazz">
                <option value="miles-davis">Miles Davis</option>
                <option value="louis-armstrong">Louis Armstrong</option>
                <option value="duke-ellington">Duke Ellington</option>
            </optgroup>
        </select>

        <br><br>
        <input type="submit" value="Enviar preferencias">
    </form>
    </main>
    <footer>
        <p>2026 - Desarrollo Web. Creado por Ortega Martínez Fernando</p>
    </footer>
</body>
</html>
