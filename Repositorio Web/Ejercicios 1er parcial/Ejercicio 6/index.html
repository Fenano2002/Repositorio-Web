<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="../../img pagina principal/upiicsa.png" type="image/jpeg">
</head>
<body>

    <nav class="navbar">
        <div class="logo">Repositorio Web</div>
        <ul class="nav-links">
            <li><a href="../../index.html">REGRESAR</a></li>
        </ul>
    </nav>

    <main>
        <div class="contenedor">
            <h1>Solicitud de alta como usuario</h1>
            <form>
                <label>Nombre:</label>
                <input type="text" name="nombre">

                <label>Apellidos:</label>
                <input type="text" name="apellidos">

                <label>Correo electrónico:</label>
                <input type="email" name="correo">

                <label>Cuenta:</label>
                <input type="text" name="cuenta">

                <label>Contraseña:</label>
                <input type="password" name="contrasena">

                <label>Observaciones:</label>
                <textarea name="observaciones" rows="4"></textarea>

                <input class="boton" type="submit" value="Enviar">
                <input class="boton" type="reset" value="Borrar">
            </form>
        </div>
    </main>

    <footer>
        <p>2026 - Desarrollo Web. Creado por Jiménez Jaramillo Ever</p>
    </footer>

</body>
</html>
