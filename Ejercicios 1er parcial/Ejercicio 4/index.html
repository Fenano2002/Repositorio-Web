<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="../../img pagina principal/upiicsa.png" type="image/jpeg">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Repositorio Web</div>
        <ul class="nav-links">
            <li><a href="../../index.html">REGRESAR</a></li>
        </ul>
    </nav>
    <main>
        <h1>Formulario de registro</h1>
        <form action="#" method="post">
            <fieldset>
                <legend>Datos personales</legend>
                <p>
                    <label for="nombre">Nombre:</label><br>
                    <input type="text" id="nombre" name="nombre" required>
                </p>
                <p>
                    <label for="apellidos">Apellidos:</label><br>
                    <input type="text" id="apellidos" name="apellidos" required>
                </p>
                <p>
                    <label>Sexo:</label><br>
                    <input type="radio" id="hombre" name="sexo" value="hombre">
                    <label for="hombre">Hombre</label>
                    <input type="radio" id="mujer" name="sexo" value="mujer">
                    <label for="mujer">Mujer</label>
                </p>
                <p>
                    <label for="correo">Correo:</label><br>
                    <input type="email" id="correo" name="correo" required>
                </p>
                <p>
                    <label for="poblacion">Población:</label><br>
                    <select id="poblacion" name="poblacion">
                        <option value="alicante">Alicante</option>
                        <option value="madrid">Madrid</option>
                        <option value="barcelona">Barcelona</option>
                        <option value="valencia">Valencia</option>
                    </select>
                </p>
                <p>
                    <label for="descripcion">Descripción:</label><br>
                    <textarea id="descripcion" name="descripcion" rows="5" cols="40"></textarea>
                </p>
            </fieldset>
            <br>
            <fieldset>
                <legend>Preferencias</legend>
                <div class="form-group-checkbox">
                    <input type="checkbox" id="info" name="info">
                    <label for="info">Deseo recibir información sobre novedades y ofertas</label>
                </div>
                <div class="form-group-checkbox">
                    <input type="checkbox" id="condiciones" name="condiciones" required>
                    <label for="condiciones">
                        Declaro haber leído y aceptar las condiciones generales del programa y la normativa sobre protección de datos
                    </label>
                </div>
            </fieldset>
            <br>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpiar">
        </form>
    </main>
    <footer>
        <p>2026 - Desarrollo Web. Creado por Cervantes Vázquez Jonatan</p>
    </footer>
</body>
</html>
